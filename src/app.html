<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<!-- Set display density before first paint to prevent flash -->
		<script>try{var d=localStorage.getItem('display');document.documentElement.dataset.display=d?JSON.parse(d):'comfortable'}catch(e){document.documentElement.dataset.display='comfortable'}</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
