services:
  kitchie:
    container_name: kitchie
    image: ghcr.io/nikhilweee/kitchie:latest
    restart: unless-stopped
    volumes:
      - /mnt/storage/kitchie:/app/data
    environment:
      DATABASE_URL: /app/data/kitchie.db
    networks:
      - proxyman_default
    labels:
      - com.centurylinklabs.watchtower.enable=true

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup --label-enable

networks:
  proxyman_default:
    external: true
